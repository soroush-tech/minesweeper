name: Bug report 🐛
description: Create a bug report for Minesweeper.
labels: ['status: needs triage']
type: 'Bug'
body:
  - type: markdown
    attributes:
      value: |
        Please provide a searchable summary of the issue in the title above ⬆️.

        Thanks for contributing by creating an issue! ❤️
  - type: checkboxes
    attributes:
      label: Duplicates
      description: Please [search the history](https://github.com/soroush-tech/minesweeper/issues) to see if an issue already exists for the same problem.
      options:
        - label: I have searched the existing issues
          required: true
  - type: checkboxes
    attributes:
      label: Latest version
      description: We roll bug fixes, performance enhancements, and other improvements into new releases.
      options:
        - label: I have tested the latest version
          required: true
  - type: textarea
    attributes:
      label: Steps to reproduce 🕹
      description: |
        **⚠️ Issues that we can't reproduce will be closed.**

        Please provide a valid link to detailed set of steps to reproduce this issue.
      value: |
        Link to live example:

        Steps:

        1.
        2.
        3.
  - type: textarea
    attributes:
      label: Current behavior 😯
      description: Describe what happens instead of the expected behavior.
  - type: textarea
    attributes:
      label: Expected behavior 🤔
      description: Describe what should happen.
  - type: textarea
    attributes:
      label: Context 🔦
      description: What are you trying to accomplish? How has this issue affected you? Providing context helps us come up with a solution that is more useful in the real world.
  - type: textarea
    attributes:
      label: Your environment 🌎
      description: Provide details about your environment where the issue occurs. This may include operating system, browser version, and any relevant configuration. If applicable, please include the output from any environment-specific diagnostic tools or commands.
      value: |
        <details>
          <summary><code>Environment details</code></summary>

        ```
          - Operating System:
          - Browser and version (if applicable):
          - Any relevant configuration or environment settings:

          If you used a specific diagnostic tool or command, include its output here.
        ```
        </details>
